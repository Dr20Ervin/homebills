<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HomeBills Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f8; padding: 40px 0; }
        .setup-card { max-width: 800px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .setup-header { background: #4e73df; color: white; padding: 30px; text-align: center; }
        .setup-body { padding: 30px; }
        .cat-row { background: #f8f9fc; border: 1px solid #e3e6f0; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <div class="setup-header">
            <h2><i class="mdi mdi-rocket-launch"></i> Welcome to HomeBills</h2>
            <p class="mb-0">Let's set up your environment</p>
        </div>
        
        <form method="POST" class="setup-body">
            <h5 class="fw-bold mb-3"><i class="mdi mdi-account-shield"></i> Create Admin Account</h5>
            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Admin Username</label>
                    <input type="text" name="admin_user" class="form-control" placeholder="e.g. admin" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Admin Password</label>
                    <input type="password" name="admin_pass" class="form-control" placeholder="Secure Password" required>
                </div>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0"><i class="mdi mdi-shape"></i> Expense Categories</h5>
                <div>
                    <button type="button" class="btn btn-sm btn-outline-primary me-2" onclick="loadDefaults()">
                        <i class="mdi mdi-magic-staff"></i> Suggest Defaults
                    </button>
                    <button type="button" class="btn btn-sm btn-success" onclick="addInfoRow()">
                        <i class="mdi mdi-plus"></i> Add One
                    </button>
                </div>
            </div>

            <div id="categoryContainer">
                </div>

            <div class="mt-4 text-end">
                <button type="submit" class="btn btn-primary btn-lg px-5">Complete Setup <i class="mdi mdi-arrow-right"></i></button>
            </div>
        </form>
    </div>
</div>

<script>
    function addInfoRow(name='', unit='', cost='', icon='mdi-circle', color='#4e73df') {
        const div = document.createElement('div');
        div.className = 'cat-row row align-items-center g-2';
        div.innerHTML = `
            <div class="col-md-3">
                <input type="text" name="cat_name[]" class="form-control form-control-sm" placeholder="Name" value="${name}" required>
            </div>
            <div class="col-md-2">
                <input type="text" name="cat_unit[]" class="form-control form-control-sm" placeholder="Unit (kWh)" value="${unit}">
            </div>
            <div class="col-md-2">
                <input type="number" step="0.01" name="cat_cost[]" class="form-control form-control-sm" placeholder="Price/Unit" value="${cost}">
            </div>
            <div class="col-md-2">
                <input type="text" name="cat_icon[]" class="form-control form-control-sm" placeholder="Icon" value="${icon}">
            </div>
            <div class="col-md-1">
                <input type="color" name="cat_color[]" class="form-control form-control-color w-100" value="${color}">
            </div>
            <div class="col-md-2 text-end">
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.parentElement.parentElement.remove()">Remove</button>
            </div>
        `;
        document.getElementById('categoryContainer').appendChild(div);
    }

    function loadDefaults() {
        const container = document.getElementById('categoryContainer');
        container.innerHTML = ''; 
        
        const defaults = [
            {name: 'Rent', unit: '', cost: 500, icon: 'mdi-home', color: '#4e73df'},
            {name: 'Electricity', unit: 'kWh', cost: 0.50, icon: 'mdi-flash', color: '#f6c23e'},
            {name: 'Gas', unit: 'm3', cost: 1.20, icon: 'mdi-fire', color: '#e74a3b'},
            {name: 'Water', unit: 'L', cost: 0.05, icon: 'mdi-water', color: '#36b9cc'},
            {name: 'Internet', unit: '', cost: 40, icon: 'mdi-wifi', color: '#1cc88a'}
        ];

        defaults.forEach(d => addInfoRow(d.name, d.unit, d.cost, d.icon, d.color));
    }

    addInfoRow();
</script>

</body>
</html>
