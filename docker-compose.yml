services:
  homebills:
    image: 20ervin/homebills:latest
    build: .
    container_name: homebills
    ports:
      - "5020:5020"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-to-something-secure}
      - DATABASE=psql
      - DEFAULT_THEME=dark
      - PSQL_USER=${POSTGRES_USER:-hb_user}
      - PSQL_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - PSQL_HOST=db
      - PSQL_DB=${POSTGRES_DB:-homebills_db}
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: homebills_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hb_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-homebills_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hb_user} -d ${POSTGRES_DB:-homebills_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
